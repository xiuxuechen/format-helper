  - rule_id: "RSC-COMMON-ZERO-CONFIDENCE"
    condition: "required_slot_confidence_eq_0"
    severity: "error"
    blocks_confirmation_gate: true
    message: "槽位值置信度为0，无法自动确定，必须人工确认。"
    remediation: "人工确认该槽位的正确值，或从标准文档中重新抽取。"
    applies_to: "all_roles"
    applies_to_slots: "required_slots"
